app-id: com.aurel.Nexus
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp # Tauri utilise des bases similaires pour le rendu web
command: nexus
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
modules:
  - name: nexus
    buildsystem: simple
    build-commands:
      - install -D nexus /app/bin/nexus
    sources:
      - type: file
        url: https://github.com/KOUSSEMON-Aurel/Nexus-Storage/releases/download/app-v__VERSION__/nexus___VERSION___amd64.AppImage
        sha256: __SHA256__
        dest-filename: nexus
